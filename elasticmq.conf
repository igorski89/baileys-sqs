include "default"

queues {
  input-queue { }
  output-queue { }
}

node {
  # Node address for internal communication
}

rest-sqs {
  enabled = true
  bind-port = 9324
  bind-hostname = "0.0.0.0"
  # Allow larger messages (up to 256MB like AWS SQS)
  sqs-limits = relaxed
}

rest-stats {
  enabled = true
  bind-port = 9325
  bind-hostname = "0.0.0.0"
}
