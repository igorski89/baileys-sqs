services:
  # ElasticMQ - SQS-compatible queue server for local development
  elasticmq:
    container_name: baileys-sqs-elasticmq
    image: softwaremill/elasticmq-native:latest
    ports:
      - "9324:9324"  # SQS API port
      - "9325:9325"  # REST API port
    volumes:
      - ./elasticmq.conf:/opt/elasticmq.conf
      - ./docker-volumes/elasticmq:/data
    command: -Dconfig.file=/opt/elasticmq.conf
    networks:
      - baileys-sqs-network

  # Baileys SQS Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: baileys-sqs-app
    environment:
      - NODE_ENV=development
      - AWS_REGION=elasticmq
      - AWS_ACCESS_KEY_ID=local
      - AWS_SECRET_ACCESS_KEY=local
      - AWS_ENDPOINT_URL=http://elasticmq:9324
      - INPUT_QUEUE=http://elasticmq:9324/queue/input-queue
      - OUTPUT_QUEUE=http://elasticmq:9324/queue/output-queue
      - SESSION_DIR=/app/auth_info_baileys
      - LOG_LEVEL=debug
    volumes:
      - ./docker-volumes/auth:/app/auth_info_baileys
    depends_on:
      - elasticmq
    networks:
      - baileys-sqs-network
    stdin_open: true
    tty: true

  # CLI Sender Tool - Interactive WhatsApp message sender
  sender:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: baileys-sqs-sender
    command: node dist/sender.js
    environment:
      - NODE_ENV=development
      - AWS_REGION=elasticmq
      - AWS_ACCESS_KEY_ID=local
      - AWS_SECRET_ACCESS_KEY=local
      - AWS_ENDPOINT_URL=http://elasticmq:9324
      - INPUT_QUEUE=http://elasticmq:9324/queue/input-queue
    depends_on:
      - elasticmq
    networks:
      - baileys-sqs-network
    stdin_open: true
    tty: true

networks:
  baileys-sqs-network:
    driver: bridge
