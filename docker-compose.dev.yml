services:
  # ElasticMQ - SQS-compatible queue server for local development
  elasticmq:
    container_name: baileys-sqs-elasticmq-dev
    image: softwaremill/elasticmq-native:latest
    ports:
      - "9324:9324"  # SQS API port
      - "9325:9325"  # REST API port
    volumes:
      - ./elasticmq.conf:/opt/elasticmq.conf
      - ./docker-volumes/elasticmq:/data
    command: -Dconfig.file=/opt/elasticmq.conf
    networks:
      - baileys-sqs-network

  # Baileys SQS Application - Development mode with hot reload
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: baileys-sqs-app-dev:latest
    container_name: baileys-sqs-app-dev
    command: >
      sh -c "npm install &&
             npx tsx watch --clear-screen=false index.ts"
    volumes:
      # Mount source code for hot reloading
      - .:/app
      # Persist node_modules separately to avoid overwriting with empty host directory
      - /app/node_modules
      # Persist WhatsApp auth credentials
      - ./docker-volumes/auth:/app/auth_info_baileys
    environment:
      - NODE_ENV=development
      - AWS_REGION=elasticmq
      - AWS_ACCESS_KEY_ID=local
      - AWS_SECRET_ACCESS_KEY=local
      - AWS_ENDPOINT_URL=http://elasticmq:9324
      - INPUT_QUEUE=http://elasticmq:9324/queue/input-queue
      - OUTPUT_QUEUE=http://elasticmq:9324/queue/output-queue
      - SESSION_DIR=/app/auth_info_baileys
      - LOG_LEVEL=debug
      - WHATSAPP_VERSION=[2, 3000, 1036200034]
    depends_on:
      - elasticmq
    networks:
      - baileys-sqs-network
    stdin_open: true
    tty: true

  # Output Queue Listener - For development debugging
  listener:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: baileys-sqs-listener-dev:latest
    container_name: baileys-sqs-listener-dev
    command: >
      sh -c "npm install &&
             npx tsx watch --clear-screen=false listener.ts"
    volumes:
      # Mount source code for hot reloading
      - .:/app
      # Persist node_modules separately
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - AWS_REGION=elasticmq
      - AWS_ACCESS_KEY_ID=local
      - AWS_SECRET_ACCESS_KEY=local
      - OUTPUT_QUEUE=http://elasticmq:9324/queue/output-queue
      - DEBUG=true
    depends_on:
      - elasticmq
    networks:
      - baileys-sqs-network
    stdin_open: true
    tty: true

  # CLI Sender Tool - Interactive WhatsApp message sender
  sender:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: baileys-sqs-sender-dev:latest
    container_name: baileys-sqs-sender-dev
    command: >
      sh -c "npm install &&
             npx tsx sender.ts"
    volumes:
      # Mount source code for hot reloading
      - .:/app
      # Persist node_modules separately
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - AWS_REGION=elasticmq
      - AWS_ACCESS_KEY_ID=local
      - AWS_SECRET_ACCESS_KEY=local
      - AWS_ENDPOINT_URL=http://elasticmq:9324
      - INPUT_QUEUE=http://elasticmq:9324/queue/input-queue
    depends_on:
      - elasticmq
    networks:
      - baileys-sqs-network
    stdin_open: true
    tty: true

networks:
  baileys-sqs-network:
    driver: bridge
